name: Build Win10 Python 3.9 Playwright Offline Package

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Output artifact/package base name"
        required: true
        default: "win10-python39-playwright155-offline"

jobs:
  build:
    name: Build offline package
    runs-on: windows-2022

    env:
      PYTHON_VERSION: "3.9.13"
      PLAYWRIGHT_VERSION: "1.55.0"
      EXPECTED_CHROMIUM_REVISION: "1187"
      EXPECTED_FFMPEG_REVISION: "1011"
      PACKAGE_ROOT: "offline"
      PLAYWRIGHT_BROWSERS_DIR: "offline\\ms-playwright"

    steps:
      - name: Install Python 3.9.13 from official installer for build-time pip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $pythonInstaller = "python-$env:PYTHON_VERSION-amd64.exe"
          $pythonUrl = "https://www.python.org/ftp/python/$env:PYTHON_VERSION/$pythonInstaller"
          $pythonInstallDir = Join-Path $env:GITHUB_WORKSPACE "cpython-$($env:PYTHON_VERSION)-x64"

          Write-Host "Downloading $pythonUrl"
          Invoke-WebRequest -Uri $pythonUrl -OutFile $pythonInstaller

          Write-Host "Installing Python to $pythonInstallDir"
          Start-Process -FilePath ".\$pythonInstaller" -ArgumentList @(
            "/quiet",
            "InstallAllUsers=0",
            "TargetDir=$pythonInstallDir",
            "PrependPath=0",
            "Include_test=0",
            "Include_launcher=0",
            "Include_pip=1"
          ) -Wait -NoNewWindow

          $pythonExe = Join-Path $pythonInstallDir "python.exe"
          if (!(Test-Path $pythonExe)) {
            throw "Python install failed: $pythonExe not found"
          }

          "PYTHON_EXE=$pythonExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PYTHON_INSTALL_DIR=$pythonInstallDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Show build Python environment
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          & "$env:PYTHON_EXE" --version
          & "$env:PYTHON_EXE" -c "import sys; print(sys.executable); print(sys.version)"
          & "$env:PYTHON_EXE" -m pip --version

      - name: Prepare offline package directories
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          New-Item -ItemType Directory -Force -Path "$env:PACKAGE_ROOT" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:PACKAGE_ROOT\python-runtime" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:PACKAGE_ROOT\python-runtime\Lib\site-packages" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:PACKAGE_ROOT\wheelhouse" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:PACKAGE_ROOT\ms-playwright" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:PACKAGE_ROOT\smoke_tests" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:PACKAGE_ROOT\examples" | Out-Null

      - name: Write pinned requirements
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          @"
          setuptools==80.9.0
          Pillow==11.3.0
          playwright==1.55.0
          pytest==8.3.3
          pytest-assume==2.4.3
          pytest-base-url==2.1.0
          pytest-html==4.1.1
          pytest-metadata==3.1.1
          pytest-playwright==0.7.1
          pytest-playwright-snapshot==1.0
          "@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\requirements.txt" -Encoding utf8

          Get-Content "$env:PACKAGE_ROOT\requirements.txt"

      - name: Download and prepare Python 3.9.13 embeddable runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $pythonZip = "python-$env:PYTHON_VERSION-embed-amd64.zip"
          $pythonUrl = "https://www.python.org/ftp/python/$env:PYTHON_VERSION/$pythonZip"

          Write-Host "Downloading $pythonUrl"
          Invoke-WebRequest -Uri $pythonUrl -OutFile "$env:PACKAGE_ROOT\$pythonZip"

          Expand-Archive -Path "$env:PACKAGE_ROOT\$pythonZip" -DestinationPath "$env:PACKAGE_ROOT\python-runtime" -Force

          $pth = Get-ChildItem "$env:PACKAGE_ROOT\python-runtime" -Filter "python*._pth" | Select-Object -First 1
          if ($null -eq $pth) {
            throw "Could not find python ._pth file in embedded runtime"
          }

          $lines = New-Object System.Collections.Generic.List[string]
          $original = Get-Content $pth.FullName

          foreach ($line in $original) {
            if ($line -eq "#import site") {
              $lines.Add("import site")
            } else {
              $lines.Add($line)
            }
          }

          if ($lines -notcontains "Lib\site-packages") {
            $insertIndex = $lines.Count
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -eq "import site") {
                $insertIndex = $i
                break
              }
            }
            $lines.Insert($insertIndex, "Lib\site-packages")
          }

          Set-Content -Path $pth.FullName -Value $lines -Encoding ASCII

          Write-Host "Final embedded Python ._pth file:"
          Get-Content $pth.FullName

          Write-Host "Embedded Python runtime prepared:"
          Get-ChildItem "$env:PACKAGE_ROOT\python-runtime" | Select-Object Name, Length | Format-Table -AutoSize

      - name: Install Python packages directly into embedded runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $sitePackages = Resolve-Path "$env:PACKAGE_ROOT\python-runtime\Lib\site-packages"

          & "$env:PYTHON_EXE" -m pip install --upgrade pip
          & "$env:PYTHON_EXE" -m pip install `
            --target "$sitePackages" `
            -r "$env:PACKAGE_ROOT\requirements.txt"

          & "$env:PACKAGE_ROOT\python-runtime\python.exe" -c "import sys; print(sys.executable); print(sys.version); import site; print('site ok')"
          & "$env:PACKAGE_ROOT\python-runtime\python.exe" -m pip --version

          & "$env:PACKAGE_ROOT\python-runtime\python.exe" -m pip list --format=freeze | Out-File -FilePath "$env:PACKAGE_ROOT\requirements.lock.txt" -Encoding utf8

          Write-Host "Installed packages in embedded runtime:"
          Get-Content "$env:PACKAGE_ROOT\requirements.lock.txt"

      - name: Download wheelhouse for offline reference
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          & "$env:PYTHON_EXE" -m pip download `
            --dest "$env:PACKAGE_ROOT\wheelhouse" `
            -r "$env:PACKAGE_ROOT\requirements.txt"

          Write-Host "Wheelhouse:"
          Get-ChildItem "$env:PACKAGE_ROOT\wheelhouse" | Select-Object Name, Length | Format-Table -AutoSize

      - name: Download Playwright Chromium and ffmpeg only
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $browserPath = (Resolve-Path "$env:PLAYWRIGHT_BROWSERS_DIR").Path
          $env:PLAYWRIGHT_BROWSERS_PATH = $browserPath

          Write-Host "PLAYWRIGHT_BROWSERS_PATH=$env:PLAYWRIGHT_BROWSERS_PATH"

          & "$env:PACKAGE_ROOT\python-runtime\python.exe" -m playwright install chromium ffmpeg

          Write-Host "Playwright installed browsers:"
          & "$env:PACKAGE_ROOT\python-runtime\python.exe" -m playwright install --list

          Write-Host "Browser directory:"
          Get-ChildItem "$env:PACKAGE_ROOT\ms-playwright" | Select-Object Name, FullName | Format-Table -AutoSize

          $expectedChromiumDir = Join-Path "$env:PACKAGE_ROOT\ms-playwright" "chromium-$env:EXPECTED_CHROMIUM_REVISION"
          $expectedFfmpegDir = Join-Path "$env:PACKAGE_ROOT\ms-playwright" "ffmpeg-$env:EXPECTED_FFMPEG_REVISION"

          if (!(Test-Path $expectedChromiumDir)) {
            throw "Expected Chromium directory not found: $expectedChromiumDir"
          }

          if (!(Test-Path $expectedFfmpegDir)) {
            throw "Expected ffmpeg directory not found: $expectedFfmpegDir"
          }

          Write-Host "Expected Playwright browser revisions are present:"
          Write-Host "  chromium-$env:EXPECTED_CHROMIUM_REVISION"
          Write-Host "  ffmpeg-$env:EXPECTED_FFMPEG_REVISION"

          Write-Host "ffmpeg directory tree:"
          Get-ChildItem "$expectedFfmpegDir" -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Write offline verification script
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          @'
          import os
          import sys
          import subprocess
          import importlib.metadata as metadata

          print("Python executable:", sys.executable)
          print("Python version:", sys.version)
          print("PLAYWRIGHT_BROWSERS_PATH:", os.environ.get("PLAYWRIGHT_BROWSERS_PATH"))

          expected_versions = {
              "setuptools": "80.9.0",
              "Pillow": "11.3.0",
              "playwright": "1.55.0",
              "pytest": "8.3.3",
              "pytest-assume": "2.4.3",
              "pytest-base-url": "2.1.0",
              "pytest-html": "4.1.1",
              "pytest-metadata": "3.1.1",
              "pytest-playwright": "0.7.1",
              "pytest-playwright-snapshot": "1.0",
          }

          print("")
          print("Checking package versions:")
          for package, expected in expected_versions.items():
              actual = metadata.version(package)
              print(f"  {package}: {actual}")
              if actual != expected:
                  raise RuntimeError(f"{package} version mismatch: expected {expected}, got {actual}")

          print("")
          print("Checking imports:")
          import PIL
          import playwright
          import pytest
          import pytest_assume
          import pytest_base_url
          import pytest_html
          import pytest_metadata
          import pytest_playwright
          import pytest_playwright_snapshot

          print("  PIL:", PIL.__file__)
          print("  playwright:", playwright.__file__)
          print("  pytest:", pytest.__file__)
          print("  pytest_html:", pytest_html.__file__)

          browser_root = os.environ.get("PLAYWRIGHT_BROWSERS_PATH")
          if not browser_root or not os.path.isdir(browser_root):
              raise RuntimeError("PLAYWRIGHT_BROWSERS_PATH is missing or invalid")

          entries = sorted(os.listdir(browser_root))
          print("")
          print("Playwright browser root entries:")
          for entry in entries:
              print(" ", entry)

          if "chromium-1187" not in entries:
              raise RuntimeError("Expected chromium-1187 was not found")
          if "ffmpeg-1011" not in entries:
              raise RuntimeError("Expected ffmpeg-1011 was not found")

          from playwright.sync_api import sync_playwright

          print("")
          print("Launching Chromium headless smoke test:")
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto("data:text/html,<html><head><title>offline-ok</title></head><body>ok</body></html>")
              title = page.title()
              browser.close()

          print("  page.title():", title)
          if title != "offline-ok":
              raise RuntimeError("Chromium smoke test failed")

          print("")
          print("Checking Playwright ffmpeg binary:")
          ffmpeg_candidates = []
          for root, dirs, files in os.walk(browser_root):
              for file in files:
                  lower = file.lower()
                  if lower in ("ffmpeg.exe", "ffmpeg") or lower.startswith("ffmpeg"):
                      ffmpeg_candidates.append(os.path.join(root, file))

          if not ffmpeg_candidates:
              print("No direct ffmpeg executable name matched. Dumping ffmpeg-1011 tree:")
              ffmpeg_dir = os.path.join(browser_root, "ffmpeg-1011")
              for root, dirs, files in os.walk(ffmpeg_dir):
                  for file in files:
                      print(" ", os.path.join(root, file))
              raise RuntimeError("No Playwright ffmpeg binary found")

          for candidate in ffmpeg_candidates:
              print(" ", candidate)

          ffmpeg_exe = ffmpeg_candidates[0]
          result = subprocess.run([ffmpeg_exe, "-version"], check=True, capture_output=True, text=True)
          print(result.stdout.splitlines()[0])

          print("")
          print("Offline verification OK")
          '@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\verify-offline.py" -Encoding utf8

      - name: Write cmd helper scripts and README
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          @'
          @echo off

          rem Activate offline Python Playwright environment using embedded Python runtime.
          rem Usage:
          rem   call env.cmd

          set "OFFLINE_ROOT=%~dp0"
          set "OFFLINE_ROOT=%OFFLINE_ROOT:~0,-1%"

          set "PYTHON_RUNTIME=%OFFLINE_ROOT%\python-runtime"
          set "PYTHON_EXE=%PYTHON_RUNTIME%\python.exe"

          if not exist "%PYTHON_EXE%" (
            echo [ERROR] Cannot find embedded Python:
            echo   %PYTHON_EXE%
            exit /b 1
          )

          set "PLAYWRIGHT_BROWSERS_PATH=%OFFLINE_ROOT%\ms-playwright"

          if not exist "%PLAYWRIGHT_BROWSERS_PATH%" (
            echo [ERROR] Cannot find Playwright browsers directory:
            echo   %PLAYWRIGHT_BROWSERS_PATH%
            exit /b 1
          )

          set "FFMPEG_DIR="
          for /d %%D in ("%PLAYWRIGHT_BROWSERS_PATH%\ffmpeg-*") do (
            set "FFMPEG_DIR=%%D"
          )

          set "PATH=%PYTHON_RUNTIME%;%PATH%"
          if defined FFMPEG_DIR set "PATH=%FFMPEG_DIR%;%PATH%"

          echo Offline Python Playwright environment activated.
          echo.
          echo OFFLINE_ROOT=%OFFLINE_ROOT%
          echo PYTHON_EXE=%PYTHON_EXE%
          echo PLAYWRIGHT_BROWSERS_PATH=%PLAYWRIGHT_BROWSERS_PATH%
          if defined FFMPEG_DIR echo FFMPEG_DIR=%FFMPEG_DIR%
          echo.

          "%PYTHON_EXE%" --version
          "%PYTHON_EXE%" -m playwright --version

          exit /b 0
          '@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\env.cmd" -Encoding ascii

          @'
          @echo off

          call "%~dp0env.cmd"
          if errorlevel 1 exit /b 1

          echo.
          echo Running offline verification...
          "%PYTHON_EXE%" "%~dp0verify-offline.py"

          if errorlevel 1 (
            echo.
            echo [ERROR] Verification failed.
            exit /b 1
          )

          echo.
          echo Verification OK.
          exit /b 0
          '@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\verify-offline.cmd" -Encoding ascii

          @'
          @echo off

          call "%~dp0env.cmd"
          if errorlevel 1 exit /b 1

          "%PYTHON_EXE%" %*
          exit /b %errorlevel%
          '@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\run-python.cmd" -Encoding ascii

          @'
          @echo off

          call "%~dp0env.cmd"
          if errorlevel 1 exit /b 1

          "%PYTHON_EXE%" -m pytest %*
          exit /b %errorlevel%
          '@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\run-pytest.cmd" -Encoding ascii

          @'
          @echo off

          call "%~dp0env.cmd"
          if errorlevel 1 exit /b 1

          "%PYTHON_EXE%" -m playwright %*
          exit /b %errorlevel%
          '@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\run-playwright.cmd" -Encoding ascii

          @'
          @echo off

          call "%~dp0env.cmd"
          if errorlevel 1 exit /b 1

          if "%~1"=="" (
            "%PYTHON_EXE%" -m playwright codegen
          ) else (
            "%PYTHON_EXE%" -m playwright codegen %*
          )

          exit /b %errorlevel%
          '@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\playwright-codegen.cmd" -Encoding ascii

          @'
          @echo off

          call "%~dp0env.cmd"
          if errorlevel 1 exit /b 1

          "%PYTHON_EXE%" -m playwright install --list
          exit /b %errorlevel%
          '@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\playwright-list.cmd" -Encoding ascii

          @'
          def test_basic_ok():
              assert True
          '@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\smoke_tests\test_basic.py" -Encoding utf8

          @'
          from playwright.sync_api import sync_playwright

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto("data:text/html,<title>offline-ok</title><h1>Hello offline Playwright</h1>")
              print(page.title())
              browser.close()
          '@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\examples\test_browser.py" -Encoding utf8

          @'
          # Win10 Python 3.9 + Playwright 1.55 离线包使用说明

          本包是 Windows 10 x64 离线 Python + Playwright 包。

          这一版不包含 `venv\`，所有命令都直接使用：

          ```text
          python-runtime\python.exe
          ```

          因此不会再遇到 Windows venv 搬迁后仍然引用 GitHub Actions 构建路径的问题。

          ---

          ## 1. 解压

          将 artifact 中的 zip 解压到目标 Win10，例如：

          ```text
          C:\offline-python39-playwright
          ```

          解压后应能看到：

          ```text
          python-runtime\
          ms-playwright\
          wheelhouse\
          smoke_tests\
          examples\
          requirements.txt
          requirements.lock.txt
          verify-offline.py
          env.cmd
          verify-offline.cmd
          run-python.cmd
          run-pytest.cmd
          run-playwright.cmd
          playwright-codegen.cmd
          playwright-list.cmd
          README-WIN10-OFFLINE.md
          ```

          ---

          ## 2. 验证离线包

          打开 `cmd.exe`：

          ```bat
          cd /d C:\offline-python39-playwright
          verify-offline.cmd
          ```

          如果看到：

          ```text
          Offline verification OK
          Verification OK.
          ```

          说明当前机器可用。

          验证内容包括：

          - Python 3.9.13 可启动
          - Python 包版本正确
          - Playwright 可导入
          - Chromium headless 可启动
          - ffmpeg 可执行
          - pytest 可运行
          - pytest-html 可生成报告

          ---

          ## 3. 进入离线环境

          ```bat
          cd /d C:\offline-python39-playwright
          call env.cmd
          ```

          执行后会设置：

          ```bat
          PYTHON_EXE=<当前目录>\python-runtime\python.exe
          PLAYWRIGHT_BROWSERS_PATH=<当前目录>\ms-playwright
          ```

          之后可以用：

          ```bat
          "%PYTHON_EXE%" --version
          "%PYTHON_EXE%" your_script.py
          "%PYTHON_EXE%" -m pytest tests -q
          "%PYTHON_EXE%" -m playwright --version
          ```

          ---

          ## 4. 运行 Python 脚本

          推荐使用封装命令：

          ```bat
          run-python.cmd your_script.py
          ```

          运行内置 Playwright 示例：

          ```bat
          run-python.cmd examples\test_browser.py
          ```

          正常输出：

          ```text
          offline-ok
          ```

          ---

          ## 5. 运行 pytest

          运行内置 smoke test：

          ```bat
          run-pytest.cmd smoke_tests -q
          ```

          生成 HTML 报告：

          ```bat
          run-pytest.cmd smoke_tests -q --html=pytest-smoke-report.html
          ```

          运行你的测试：

          ```bat
          run-pytest.cmd tests -q
          run-pytest.cmd tests -q --html=report.html
          ```

          ---

          ## 6. 查看 Playwright 浏览器

          ```bat
          playwright-list.cmd
          ```

          或：

          ```bat
          run-playwright.cmd install --list
          ```

          正常应能看到 Chromium 和 ffmpeg。

          注意：离线机器上不要执行：

          ```bat
          run-playwright.cmd install
          run-playwright.cmd install chromium
          ```

          因为这些命令会尝试联网下载浏览器。本包已经内置浏览器。

          ---

          ## 7. 启动 Playwright 录制器 codegen

          ### 7.1 直接启动录制器

          ```bat
          cd /d C:\offline-python39-playwright
          playwright-codegen.cmd
          ```

          ### 7.2 打开指定网址录制

          ```bat
          playwright-codegen.cmd https://example.com
          ```

          或内网地址：

          ```bat
          playwright-codegen.cmd http://your-internal-site
          ```

          ### 7.3 录制为普通 Python 脚本

          ```bat
          playwright-codegen.cmd --browser chromium --target python -o recorded_script.py https://example.com
          ```

          录制结束后，运行：

          ```bat
          run-python.cmd recorded_script.py
          ```

          ### 7.4 录制为 pytest 脚本

          ```bat
          playwright-codegen.cmd --browser chromium --target python-pytest -o test_recorded.py https://example.com
          ```

          运行：

          ```bat
          run-pytest.cmd test_recorded.py -q
          ```

          ### 7.5 使用 run-playwright.cmd 等价启动

          ```bat
          run-playwright.cmd codegen --browser chromium --target python -o recorded_script.py https://example.com
          ```

          ---

          ## 8. 已固定组件版本

          ```text
          Python runtime: 3.9.13 x64
          Playwright: 1.55.0
          Chromium: chromium-1187
          Chromium headless shell: chromium_headless_shell-1187
          ffmpeg: ffmpeg-1011
          winldd: winldd-1007

          setuptools==80.9.0
          Pillow==11.3.0
          playwright==1.55.0
          pytest==8.3.3
          pytest-assume==2.4.3
          pytest-base-url==2.1.0
          pytest-html==4.1.1
          pytest-metadata==3.1.1
          pytest-playwright==0.7.1
          pytest-playwright-snapshot==1.0
          ```

          完整依赖请查看：

          ```text
          requirements.lock.txt
          ```

          ---

          ## 9. 常见问题

          ### Q1: 目标机器没有 PowerShell 可以用吗？

          可以。本包主要使用 `.cmd` 脚本，只需要 `cmd.exe`。

          ### Q2: codegen 打不开浏览器？

          先验证：

          ```bat
          verify-offline.cmd
          playwright-list.cmd
          ```

          如果验证通过但 codegen 打不开，通常是：

          - 当前不是桌面会话
          - 企业安全软件拦截 Chromium
          - 系统策略禁止运行浏览器
          - 远程会话图形环境异常

          ### Q3: 录制外网失败？

          离线包不需要联网下载浏览器，但你录制的网址本身需要目标机器能访问。

          如果录制内网系统，只要目标机器能访问内网地址即可。

          ### Q4: 可以删除 `python-3.9.13-embed-amd64.zip` 吗？

          可以。它只是原始备份包。真正运行使用的是：

          ```text
          python-runtime\
          ```

          不过建议交付初期先保留，方便排查和恢复。
          '@ | ForEach-Object { $_.TrimStart() } | Out-File -FilePath "$env:PACKAGE_ROOT\README-WIN10-OFFLINE.md" -Encoding utf8

      - name: Verify offline package with embedded Python
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $root = (Resolve-Path "$env:PACKAGE_ROOT").Path
          $env:PLAYWRIGHT_BROWSERS_PATH = Join-Path $root "ms-playwright"
          $env:PATH = (Join-Path $root "python-runtime") + ";" + $env:PATH

          & "$env:PACKAGE_ROOT\python-runtime\python.exe" "$env:PACKAGE_ROOT\verify-offline.py"

      - name: Verify cmd helper scripts
        shell: cmd
        run: |
          cd /d offline
          call verify-offline.cmd
          call run-python.cmd --version
          call run-python.cmd -m playwright --version
          call run-python.cmd examples\test_browser.py
          call run-python.cmd -m pytest --version
          call run-pytest.cmd --version
          call run-pytest.cmd smoke_tests -q --html=pytest-smoke-report.html
          if not exist pytest-smoke-report.html exit /b 1
          call playwright-list.cmd
          call run-playwright.cmd --version

      - name: Create zip package
        shell: pwsh
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $zipName = "$env:PACKAGE_NAME-py3913-playwright1550-win10-x64-no-venv.zip"

          if (Test-Path $zipName) {
            Remove-Item $zipName -Force
          }

          Compress-Archive -Path "$env:PACKAGE_ROOT\*" -DestinationPath $zipName -CompressionLevel Optimal

          $hash = Get-FileHash $zipName -Algorithm SHA256
          "$($hash.Hash)  $zipName" | Out-File -FilePath "$zipName.sha256" -Encoding ascii

          Write-Host "Created package:"
          Get-Item $zipName, "$zipName.sha256" | Select-Object Name, Length | Format-Table -AutoSize

          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload offline package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_name }}-py3913-playwright1550-win10-x64-no-venv
          path: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256
          if-no-files-found: error
          retention-days: 7
