name: Build Claude Code and opencode Linux x64 offline packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Claude Code version or channel to download, for example stable, latest, or 2.1.89"
        required: true
        default: "stable"
      platform:
        description: "Target platform"
        required: true
        default: "linux-x64"
        type: choice
        options:
          - linux-x64

jobs:
  build-offline-package:
    name: Build offline packages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg jq coreutils tar

      - name: Download, verify, and package Claude Code
        id: package
        shell: bash
        env:
          REPO: https://downloads.claude.ai/claude-code-releases
          KEY_URL: https://downloads.claude.ai/keys/claude-code.asc
          EXPECTED_FINGERPRINT: "31DD DE24 DDFA B679 F42D 7BD2 BAA9 29FF 1A7E CACE"
          VERSION_INPUT: ${{ inputs.version }}
          PLATFORM: ${{ inputs.platform }}
        run: |
          set -euo pipefail

          WORKDIR="$PWD/work"
          OUTDIR="$PWD/out"
          mkdir -p "$WORKDIR" "$OUTDIR"
          cd "$WORKDIR"

          echo "==> Import Anthropic Claude Code release signing key"
          curl -fsSL "$KEY_URL" -o claude-code.asc
          gpg --import claude-code.asc

          ACTUAL_FINGERPRINT="$(gpg --fingerprint --with-colons security@anthropic.com | awk -F: '/^fpr:/ {print $10; exit}')"
          EXPECTED_COMPACT="$(printf '%s' "$EXPECTED_FINGERPRINT" | tr -d ' ')"

          echo "Expected fingerprint: $EXPECTED_COMPACT"
          echo "Actual fingerprint:   $ACTUAL_FINGERPRINT"
          test "$ACTUAL_FINGERPRINT" = "$EXPECTED_COMPACT"

          echo "==> Install Claude Code with official native installer: $VERSION_INPUT"
          curl -fsSL https://claude.ai/install.sh -o install.sh
          bash install.sh "$VERSION_INPUT"

          CLAUDE_BIN="${HOME}/.local/bin/claude"
          if [ ! -x "$CLAUDE_BIN" ]; then
            echo "Could not find executable at $CLAUDE_BIN" >&2
            exit 1
          fi

          RESOLVED_BIN="$(readlink -f "$CLAUDE_BIN")"

          echo "Claude executable: $CLAUDE_BIN"
          echo "Resolved binary:   $RESOLVED_BIN"

          CLAUDE_VERSION_RAW="$($CLAUDE_BIN --version || true)"
          echo "claude --version: $CLAUDE_VERSION_RAW"

          ACTUAL_VERSION="$(printf '%s\n' "$CLAUDE_VERSION_RAW" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)"
          if [ -z "$ACTUAL_VERSION" ]; then
            echo "Could not parse Claude Code version from: $CLAUDE_VERSION_RAW" >&2
            exit 1
          fi

          echo "Actual installed version: $ACTUAL_VERSION"

          echo "==> Download manifest and detached signature for $ACTUAL_VERSION"
          curl -fsSLO "$REPO/$ACTUAL_VERSION/manifest.json"
          curl -fsSLO "$REPO/$ACTUAL_VERSION/manifest.json.sig"

          echo "==> Verify manifest signature"
          gpg --verify manifest.json.sig manifest.json

          echo "==> Verify Linux binary SHA256 against signed manifest"
          EXPECTED_SHA="$(jq -r --arg platform "$PLATFORM" '.platforms[$platform].checksum // empty' manifest.json)"
          if [ -z "$EXPECTED_SHA" ]; then
            echo "Could not find .platforms[$PLATFORM].checksum in manifest.json" >&2
            jq '.platforms' manifest.json >&2
            exit 1
          fi

          ACTUAL_SHA="$(sha256sum "$RESOLVED_BIN" | awk '{print $1}')"

          echo "Expected SHA256: $EXPECTED_SHA"
          echo "Actual   SHA256: $ACTUAL_SHA"
          test "$EXPECTED_SHA" = "$ACTUAL_SHA"

          echo "==> Prepare offline payload"
          install -m 0755 "$RESOLVED_BIN" "$OUTDIR/claude"
          cp manifest.json manifest.json.sig claude-code.asc "$OUTDIR/"

          cat > "$OUTDIR/install-offline.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          PREFIX="${PREFIX:-$HOME/.local}"
          BIN_DIR="$PREFIX/bin"

          mkdir -p "$BIN_DIR"
          install -m 0755 ./claude "$BIN_DIR/claude"

          echo "Installed Claude Code to: $BIN_DIR/claude"
          echo "If needed, add this to your shell profile:"
          echo "  export PATH=\"$BIN_DIR:\$PATH\""
          echo

          "$BIN_DIR/claude" --version || true
          EOF

          chmod +x "$OUTDIR/install-offline.sh"

          cat > "$OUTDIR/README-offline-install.txt" <<EOF
          Claude Code offline package
          ===========================

          Version:  $ACTUAL_VERSION
          Platform: $PLATFORM
          SHA256:   $ACTUAL_SHA

          Files:
          - claude
          - install-offline.sh
          - manifest.json
          - manifest.json.sig
          - claude-code.asc

          Offline install on SLES:

            tar xzf claude-code-$ACTUAL_VERSION-$PLATFORM.tgz
            cd claude-code-$ACTUAL_VERSION-$PLATFORM
            ./install-offline.sh
            echo 'export PATH="\$HOME/.local/bin:\$PATH"' >> ~/.bashrc
            source ~/.bashrc
            claude --version

          Optional system-wide install:

            sudo PREFIX=/usr/local ./install-offline.sh

          To prevent update attempts on an offline machine:

            mkdir -p ~/.claude
            cat > ~/.claude/settings.json <<'JSON'
            {
              "env": {
                "DISABLE_UPDATES": "1"
              },
              "autoUpdatesChannel": "stable"
            }
            JSON
          EOF

          cd "$OUTDIR"

          PACKAGE="claude-code-$ACTUAL_VERSION-$PLATFORM.tgz"
          PACKAGE_DIR="claude-code-$ACTUAL_VERSION-$PLATFORM"

          mkdir -p "$PACKAGE_DIR"
          cp claude install-offline.sh README-offline-install.txt manifest.json manifest.json.sig claude-code.asc "$PACKAGE_DIR/"

          tar -czf "$PACKAGE" "$PACKAGE_DIR"
          sha256sum "$PACKAGE" > "$PACKAGE.sha256"

          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$ACTUAL_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download and package latest opencode
        id: opencode
        shell: bash
        env:
          OPENCODE_REPO: anomalyco/opencode
          OPENCODE_ASSET_NAME: opencode-linux-x64.tar.gz
        run: |
          set -euo pipefail

          WORKDIR="$PWD/opencode-work"
          OUTDIR="$PWD/opencode-out"
          mkdir -p "$WORKDIR" "$OUTDIR"
          cd "$WORKDIR"

          echo "==> Resolve latest opencode release"
          RELEASE_JSON="$(curl -fsSL "https://api.github.com/repos/$OPENCODE_REPO/releases/latest")"
          TAG_NAME="$(printf '%s' "$RELEASE_JSON" | jq -r '.tag_name')"
          VERSION="${TAG_NAME#v}"
          ASSET_URL="$(printf '%s' "$RELEASE_JSON" | jq -r --arg name "$OPENCODE_ASSET_NAME" '.assets[] | select(.name == $name) | .browser_download_url' | head -1)"

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "Could not find asset $OPENCODE_ASSET_NAME in latest opencode release $TAG_NAME" >&2
            printf '%s' "$RELEASE_JSON" | jq -r '.assets[].name' >&2
            exit 1
          fi

          echo "opencode release: $TAG_NAME"
          echo "asset: $OPENCODE_ASSET_NAME"
          echo "url: $ASSET_URL"

          curl -fL "$ASSET_URL" -o "$OPENCODE_ASSET_NAME"
          ASSET_SHA256="$(sha256sum "$OPENCODE_ASSET_NAME" | awk '{print $1}')"
          echo "$ASSET_SHA256  $OPENCODE_ASSET_NAME" > "$OPENCODE_ASSET_NAME.sha256"

          mkdir extract
          tar -xzf "$OPENCODE_ASSET_NAME" -C extract

          echo "==> Extracted files"
          find extract -maxdepth 3 -type f -print

          OPENCODE_BIN="$(find extract -type f -name opencode -perm -111 | head -1 || true)"
          if [ -z "$OPENCODE_BIN" ]; then
            OPENCODE_BIN="$(find extract -type f -name opencode | head -1 || true)"
          fi
          if [ -z "$OPENCODE_BIN" ]; then
            echo "Could not find opencode binary in $OPENCODE_ASSET_NAME" >&2
            exit 1
          fi

          chmod +x "$OPENCODE_BIN"
          BIN_SHA256="$(sha256sum "$OPENCODE_BIN" | awk '{print $1}')"

          echo "opencode binary: $OPENCODE_BIN"
          echo "asset sha256:    $ASSET_SHA256"
          echo "binary sha256:   $BIN_SHA256"

          install -m 0755 "$OPENCODE_BIN" "$OUTDIR/opencode"

          cat > "$OUTDIR/install-opencode-offline.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          PREFIX="${PREFIX:-$HOME/.local}"
          BIN_DIR="$PREFIX/bin"

          mkdir -p "$BIN_DIR"
          install -m 0755 ./opencode "$BIN_DIR/opencode"

          echo "Installed opencode to: $BIN_DIR/opencode"
          echo "If needed, add this to your shell profile:"
          echo "  export PATH=\"$BIN_DIR:\$PATH\""
          echo

          "$BIN_DIR/opencode" --version || true
          EOF

          chmod +x "$OUTDIR/install-opencode-offline.sh"

          cat > "$OUTDIR/README-opencode-offline-install.txt" <<EOF
          opencode offline package
          ========================

          Source repository: https://github.com/$OPENCODE_REPO
          Release:           $TAG_NAME
          Platform:          linux-x64
          Upstream asset:    $OPENCODE_ASSET_NAME
          Asset SHA256:      $ASSET_SHA256
          Binary SHA256:     $BIN_SHA256

          Files:
          - opencode
          - install-opencode-offline.sh
          - README-opencode-offline-install.txt

          Offline install on Linux/SLES:

            tar xzf opencode-$VERSION-linux-x64-offline.tgz
            cd opencode-$VERSION-linux-x64-offline
            ./install-opencode-offline.sh
            echo 'export PATH="\$HOME/.local/bin:\$PATH"' >> ~/.bashrc
            source ~/.bashrc
            opencode --version

          Optional system-wide install:

            sudo PREFIX=/usr/local ./install-opencode-offline.sh
          EOF

          cd "$OUTDIR"

          PACKAGE="opencode-$VERSION-linux-x64-offline.tgz"
          PACKAGE_DIR="opencode-$VERSION-linux-x64-offline"

          mkdir -p "$PACKAGE_DIR"
          cp opencode install-opencode-offline.sh README-opencode-offline-install.txt "$PACKAGE_DIR/"

          tar -czf "$PACKAGE" "$PACKAGE_DIR"
          sha256sum "$PACKAGE" > "$PACKAGE.sha256"

          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload Claude Code offline package artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-${{ steps.package.outputs.version }}-linux-x64-offline
          path: |
            out/${{ steps.package.outputs.package }}
            out/${{ steps.package.outputs.package }}.sha256
          if-no-files-found: error
          retention-days: 7

      - name: Upload opencode offline package artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-${{ steps.opencode.outputs.version }}-linux-x64-offline
          path: |
            opencode-out/${{ steps.opencode.outputs.package }}
            opencode-out/${{ steps.opencode.outputs.package }}.sha256
          if-no-files-found: error
          retention-days: 7
